<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Gateway</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --border:#272b36;
    --text:#e7e9ee; --muted:#8b909c; --accent:#6d8bff; --accent2:#9b7bff;
    --user:#243049; --ok:#3ddc97; --err:#ff6b6b;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font:14px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg);color:var(--text);display:flex;overflow:hidden}
  /* sidebar */
  aside{width:260px;background:var(--panel);border-right:1px solid var(--border);flex-shrink:0;overflow:hidden;transition:width .18s ease}
  .sb-inner{width:260px;height:100%;display:flex;flex-direction:column}
  body.sidebar-collapsed aside{width:0;border-right:0}
  .brand{padding:16px 18px;font-weight:700;font-size:15px;letter-spacing:.3px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:8px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .newrow{display:flex;gap:8px;margin:12px}
  .newbtn{flex:1;padding:10px 8px;border:1px solid var(--border);border-radius:10px;background:var(--panel2);
    color:var(--text);cursor:pointer;font-weight:600;transition:.15s;font-size:13px}
  .newbtn:hover{border-color:var(--accent);color:#fff}
  .newbtn.council{background:linear-gradient(135deg,rgba(109,139,255,.16),rgba(155,123,255,.16));border-color:#3a3f6b}
  .newbtn.council:hover{border-color:var(--accent)}
  .convs{flex:1;overflow-y:auto;padding:4px 8px}
  .conv{padding:9px 11px;border-radius:8px;cursor:pointer;color:var(--muted);display:flex;gap:6px;align-items:center}
  .conv:hover{background:var(--panel2);color:var(--text)}
  .conv.active{background:var(--panel2);color:#fff}
  .conv .ctitle{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .conv .x{flex:0 0 auto;opacity:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;color:var(--muted)}
  .conv:hover .x{opacity:.6}
  .conv .x:hover{opacity:1;background:var(--border);color:#fff}
  .cicon{flex:0 0 auto;width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center}
  .cicon svg{width:11px;height:11px;fill:#fff}
  .cicon.claude{background:#d97757}
  .cicon.codex{background:#000}
  .cicon.antigravity{background:linear-gradient(135deg,#4285f4,#9b72cb)}
  .foot{padding:10px;border-top:1px solid var(--border)}
  .foot-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:8px;font:inherit;font-size:12px;cursor:pointer;transition:.12s}
  .foot-btn:hover{background:var(--panel2);color:var(--text);border-color:#3a4150}
  /* main */
  main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  .hero{display:none}
  main.welcome #chat{display:none}
  main.welcome .composer{position:absolute;left:0;right:0;top:50%;transform:translateY(-54%);border-top:0;background:transparent;padding:0}
  main.welcome .hero{display:block;text-align:center;font-size:28px;font-weight:650;color:var(--text);margin-bottom:24px;letter-spacing:-.2px}
  header{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 18px;background:var(--panel)}
  select,.tokenbtn{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font:inherit;cursor:pointer}
  header .spacer{flex:1}
  .iconbtn{background:transparent;border:0;color:var(--muted);font-size:18px;line-height:1;cursor:pointer;padding:6px 9px;border-radius:8px}
  .iconbtn:hover{background:var(--panel2);color:var(--text)}
  .htitle{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.3px}
  /* themed scrollbars (replace ugly defaults) */
  *{scrollbar-width:thin;scrollbar-color:#323845 transparent}
  *::-webkit-scrollbar{width:10px;height:10px}
  *::-webkit-scrollbar-track{background:transparent}
  *::-webkit-scrollbar-thumb{background:#323845;border-radius:8px;border:2px solid var(--bg)}
  *::-webkit-scrollbar-thumb:hover{background:#414959}
  #chat{flex:1;overflow-y:auto;padding:26px 0}
  .wrap{max-width:780px;margin:0 auto;padding:0 22px}
  .msg{display:flex;gap:13px;margin-bottom:22px;animation:fade .2s}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .avatar{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .msg.user .avatar{background:var(--user)}
  .msg.assistant .avatar{background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .msg.assistant .avatar.claude{background:#d97757}
  .msg.assistant .avatar.codex{background:#000}
  .msg.assistant .avatar.antigravity{background:linear-gradient(135deg,#4285f4,#9b72cb)}
  .msg.assistant .avatar svg{width:16px;height:16px;fill:#fff}
  .body{flex:1;min-width:0;padding-top:3px}
  .role{font-size:12px;color:var(--muted);margin-bottom:3px}
  .content{word-wrap:break-word}
  .content>*:first-child{margin-top:0}
  .content>*:last-child{margin-bottom:0}
  .content p{margin:0 0 10px}
  .content h1,.content h2,.content h3,.content h4{margin:18px 0 8px;line-height:1.3;font-weight:650}
  .content h1{font-size:1.5em} .content h2{font-size:1.3em} .content h3{font-size:1.12em} .content h4{font-size:1em}
  .content h1,.content h2{border-bottom:1px solid var(--border);padding-bottom:5px}
  .content ul,.content ol{margin:0 0 10px;padding-left:24px}
  .content li{margin:3px 0}
  .content li>p{margin:0}
  .content a{color:var(--accent);text-decoration:none}
  .content a:hover{text-decoration:underline}
  .content blockquote{margin:0 0 10px;padding:2px 14px;border-left:3px solid var(--accent);color:var(--muted)}
  .content hr{border:0;border-top:1px solid var(--border);margin:16px 0}
  .content table{border-collapse:collapse;margin:0 0 10px;display:block;overflow-x:auto}
  .content th,.content td{border:1px solid var(--border);padding:6px 10px;text-align:left}
  .content th{background:var(--panel2)}
  .content pre{background:#0b0d12;border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin:0 0 10px}
  .content code{background:#0b0d12;border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:12.5px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .content pre code{border:0;padding:0;font-size:12.5px}
  .tool{font-size:12px;color:var(--accent);margin:3px 0;font-family:ui-monospace,monospace}
  .toolcall{border:1px solid var(--border);border-radius:8px;margin:2px 0 12px;overflow:hidden;background:#0b0d12}
  .toolcall .thead{display:flex;align-items:center;gap:8px;padding:7px 11px;background:var(--panel2);font-size:12.5px}
  .toolcall .tname{color:var(--accent);font-weight:600;font-family:ui-monospace,monospace}
  .toolcall .tsub{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .toolcall .tcmd{margin:0;padding:9px 11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:#cfe3ff;white-space:pre-wrap;word-break:break-word;border-top:1px solid var(--border)}
  .toolcall .tout{margin:0;padding:9px 11px;font-family:ui-monospace,monospace;font-size:12px;color:var(--muted);white-space:pre-wrap;word-break:break-word;border-top:1px solid var(--border);max-height:240px;overflow:auto}
  .toolcall .tout.err{color:var(--err)}
  .err{color:var(--err)}
  .cursor::after{content:'▋';animation:blink 1s steps(1) infinite;color:var(--accent)}
  @keyframes blink{50%{opacity:0}}
  /* "생각 중" 이퀄라이저 스피너 */
  .thinking{display:inline-flex;align-items:flex-end;gap:3px;height:20px;padding:3px 0}
  .thinking span{width:3.5px;height:6px;border-radius:2px;background:linear-gradient(180deg,var(--accent),var(--accent2));animation:eq 1s ease-in-out infinite}
  .thinking span:nth-child(2){animation-delay:.12s}
  .thinking span:nth-child(3){animation-delay:.24s}
  .thinking span:nth-child(4){animation-delay:.36s}
  .thinking span:nth-child(5){animation-delay:.48s}
  @keyframes eq{0%,100%{height:5px;opacity:.45}50%{height:17px;opacity:1}}
  .empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:8px}
  .empty h2{color:var(--text);font-weight:600;margin:0}
  /* composer */
  .composer{border-top:1px solid var(--border);padding:14px 0;background:var(--panel)}
  .cwrap{max-width:780px;margin:0 auto;padding:0 22px}
  .inputbox{display:flex;flex-direction:row;align-items:flex-end;gap:10px;background:var(--panel2);border:1px solid var(--border);border-radius:24px;padding:7px 8px 7px 18px;transition:border-color .15s}
  .inputbox.tall{flex-direction:column;align-items:stretch;gap:6px;border-radius:22px;padding:10px 12px 10px 16px}
  .inputbox:focus-within{border-color:var(--accent)}
  .inputbox textarea{flex:1;min-width:0;width:100%;resize:none;background:transparent;color:var(--text);border:0;outline:none;
    padding:9px 2px;font:inherit;line-height:1.5;max-height:340px;overflow-y:hidden}
  .inputbox textarea::-webkit-scrollbar-thumb{border-color:var(--panel2)}
  .inputbox.tall textarea{flex:0 0 auto}
  .controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .inputbox.tall .controls{width:100%;justify-content:space-between}
  /* custom dropdown (Gemini-ish pill) */
  .dd{position:relative}
  .dd-btn{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:999px;padding:7px 12px;font-size:12.5px;cursor:pointer;white-space:nowrap;transition:.12s}
  .dd-btn:hover{border-color:#3a4150;background:#222734}
  .dd.open .dd-btn{border-color:var(--accent)}
  .dd-btn .chev{color:var(--muted);font-size:9px;transition:transform .15s}
  .dd.open .dd-btn .chev{transform:rotate(180deg)}
  .dd-val{max-width:220px;overflow:hidden;text-overflow:ellipsis}
  .dd-cap{font-size:10.5px;color:var(--muted);letter-spacing:.2px;padding-right:7px;margin-right:1px;border-right:1px solid var(--border)}
  .dd-menu{position:absolute;bottom:calc(100% + 8px);left:0;min-width:200px;background:var(--panel2);border:1px solid var(--border);
    border-radius:14px;padding:5px;box-shadow:0 14px 36px rgba(0,0,0,.55);opacity:0;visibility:hidden;transform:translateY(6px);
    transition:.14s;z-index:50;max-height:min(58vh,440px);overflow-y:auto}
  .dd.open .dd-menu{opacity:1;visibility:visible;transform:translateY(0)}
  .inputbox:not(.tall) .dd-menu{left:auto;right:0}
  /* 새 대화(중앙)에선 버튼 아래로 펼침 */
  main.welcome .dd-menu{top:calc(100% + 8px);bottom:auto;transform:translateY(-6px)}
  main.welcome .dd.open .dd-menu{transform:translateY(0)}
  .dd-lbl{padding:6px 11px 4px;font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted)}
  .dd-item{padding:8px 11px;border-radius:9px;font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .dd-item:hover{background:var(--panel)}
  .dd-item.sel{color:#fff}
  .dd-item.sel::after{content:'✓';color:var(--accent);font-size:12px}
  .dd-item.dis{color:#555;cursor:default}
  .dd-item.dis:hover{background:transparent}
  .dd-sep{margin:0 7px;color:var(--muted)}
  .dd-div{height:1px;background:var(--border);margin:5px 4px}
  .dd-item .muted{color:var(--muted);font-size:11px;margin-left:6px}
  .send{width:38px;height:38px;border-radius:50%;border:0;background:var(--accent);color:#fff;cursor:pointer;font-size:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.12s}
  .send:hover{background:#5b7bff}
  .send:disabled{opacity:.35;cursor:default}
  .send.stopbtn{background:#d65b54}
  .send.stopbtn:hover{background:#e0655e}
  .stopnote{font-size:12px;color:var(--muted);margin-top:4px}
  /* council toggle (composer) */
  .ctoggle{width:36px;height:36px;border-radius:999px;border:1px solid var(--border);background:var(--panel);color:var(--muted);cursor:pointer;font-size:15px;flex-shrink:0;transition:.12s}
  .ctoggle:hover{border-color:#3a4150;color:var(--text)}
  .ctoggle.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
  /* ===== 토론 모드 (debate stage) ===== */
  .debate-msg{display:block}
  .wrap:has(.debate-msg){max-width:920px}
  .debate{position:relative}
  /* sticky stage: roster + disputes */
  .stage{position:sticky;top:-26px;z-index:5;margin:-2px 0 22px;padding:17px 19px;border:1px solid #3c4456;border-radius:18px;
    background:linear-gradient(180deg,#2b3142,#20242f);
    box-shadow:0 16px 40px rgba(0,0,0,.55),0 0 0 1px rgba(109,139,255,.1),inset 0 1px 0 rgba(255,255,255,.05)}
  .stage-q{font-size:14px;font-weight:600;line-height:1.45;margin-bottom:13px;display:flex;gap:9px;align-items:flex-start}
  .stage-q .qmark{flex-shrink:0;width:21px;height:21px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
  .roster{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .rgroup{display:flex;align-items:center;gap:8px}
  .rtag{font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;font-weight:700;color:var(--muted);padding:3px 8px;border-radius:7px;border:1px solid var(--border)}
  .rgroup.mod .rtag{color:#c3a9ff;border-color:rgba(155,123,255,.32);background:rgba(155,123,255,.08)}
  .rgroup.part .rtag{color:#9db0ff;border-color:rgba(109,139,255,.3);background:rgba(109,139,255,.07)}
  .rdiv{width:1px;height:22px;background:var(--border);margin:0 2px}
  .seat{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 6px;border:1px solid var(--border);border-radius:999px;color:var(--muted);font-size:12px;font-weight:500;opacity:.6;transition:opacity .25s,box-shadow .25s,background .25s,color .25s}
  .seat .cicon{width:21px;height:21px}
  .seat.live{opacity:1;color:#fff;border-color:transparent;background:linear-gradient(135deg,rgba(109,139,255,.28),rgba(155,123,255,.2));animation:seatGlow 1.5s ease-in-out infinite}
  @keyframes seatGlow{0%,100%{box-shadow:0 0 0 1px var(--accent),0 0 12px rgba(109,139,255,.3)}50%{box-shadow:0 0 0 1px var(--accent),0 0 26px rgba(109,139,255,.72)}}
  .rgroup.mod .seat.live{background:linear-gradient(135deg,rgba(155,123,255,.3),rgba(109,139,255,.18));animation:modGlow 1.5s ease-in-out infinite}
  @keyframes modGlow{0%,100%{box-shadow:0 0 0 1px var(--accent2),0 0 12px rgba(155,123,255,.32)}50%{box-shadow:0 0 0 1px var(--accent2),0 0 26px rgba(155,123,255,.75)}}
  .seat-sep{flex:1;min-width:10px}
  .phase-pill{font-size:11px;color:var(--muted);padding:5px 12px;border:1px solid var(--border);border-radius:999px;white-space:nowrap;background:var(--panel)}
  .disputes{display:flex;gap:7px;flex-wrap:wrap;margin-top:13px;padding-top:13px;border-top:1px solid var(--border)}
  .dispute{font-size:11.5px;color:var(--muted);padding:5px 11px;border:1px solid var(--border);border-radius:9px;display:flex;gap:7px;align-items:center;transition:.2s;max-width:300px}
  .dispute .dn{color:var(--accent);font-weight:700;flex-shrink:0}
  .dispute .dt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dispute.visited{border-color:rgba(109,139,255,.34);color:var(--text)}
  .dispute.visited .dn{color:var(--accent)}
  .dispute.active{border-color:var(--accent);color:#fff;background:rgba(109,139,255,.15);animation:dispPulse 1.6s ease-in-out infinite}
  @keyframes dispPulse{0%,100%{box-shadow:0 0 0 1px rgba(109,139,255,.5),0 0 9px rgba(109,139,255,.2)}50%{box-shadow:0 0 0 1px rgba(109,139,255,.85),0 0 20px rgba(109,139,255,.5)}}
  /* thread */
  .thread{display:flex;flex-direction:column;gap:17px}
  .sp{display:flex;gap:12px;animation:fade .25s}
  .sp .av{width:31px;height:31px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:box-shadow .25s}
  .sp .av svg{width:16px;height:16px;fill:#fff}
  .sp .av.claude{background:#d97757}.sp .av.codex{background:#000}.sp .av.antigravity{background:linear-gradient(135deg,#4285f4,#9b72cb)}
  .sp-main{flex:1;min-width:0}
  .sp-hd{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
  .sp-name{font-weight:650;font-size:13px;color:var(--text)}
  .tag{font-size:10.5px;padding:2px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .tag.vs{background:rgba(255,107,107,.12);color:#ff9a9a;border:1px solid rgba(255,107,107,.24)}
  .tag.disp{background:rgba(109,139,255,.12);color:#9db0ff;border:1px solid rgba(109,139,255,.22)}
  .sp-card{border:1px solid var(--border);border-radius:13px;background:#0e1117;padding:11px 15px;transition:box-shadow .3s,border-color .3s}
  .sp-card .content{font-size:13.5px}
  .sp.live .sp-card{border-color:var(--accent);box-shadow:0 0 0 1px rgba(109,139,255,.42),0 0 24px rgba(109,139,255,.16)}
  .sp.live .av{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--accent)}
  .sp.cut .sp-card{opacity:.66}
  .sp.cut .sp-card .content::after{content:'⏸ 중단됨';display:block;margin-top:7px;font-size:11px;color:var(--muted)}
  .sp.failed .sp-card{border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.05)}
  .sp.failed .sp-card .content{color:#ffb3b3}
  .sp.failed .av{filter:grayscale(.4);opacity:.75}
  /* moderator stage-direction line */
  .mod-line{display:flex;align-items:flex-start;gap:12px;margin:1px 0;animation:fade .25s}
  .mod-line .ml-ic{flex-shrink:0;width:31px;height:31px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--panel2);border:1px dashed #4a4170;font-size:13px;color:var(--accent2)}
  .mod-line .ml-ic .cicon{width:19px;height:19px}
  .mod-line.mod-think .ml-tx{display:none}
  .mod-line .ml-body{flex:1;min-width:0}
  .mod-line .ml-tx{font-size:12.5px;color:#9aa0ac;font-style:italic;line-height:1.55;padding-top:6px}
  .mod-line .ml-tx strong,.mod-line .ml-tx b{color:#c2c9d6;font-style:normal}
  /* user interjection (chair) */
  .sp.chair{flex-direction:row-reverse}
  .sp.chair .sp-main{display:flex;flex-direction:column;align-items:flex-end}
  .sp.chair .av{background:var(--user);color:#cdd6ff}
  .sp.chair .sp-card{background:linear-gradient(135deg,rgba(109,139,255,.18),rgba(155,123,255,.1));border-color:#3a3f6b;max-width:88%}
  .sp.chair .sp-name{color:#cdd6ff}
  /* consensus */
  .consensus{margin-top:24px;border:1px solid var(--accent);border-radius:17px;overflow:hidden;animation:fade .35s;
    background:linear-gradient(180deg,rgba(109,139,255,.13),rgba(155,123,255,.03))}
  .cons-hd{display:flex;align-items:center;gap:9px;padding:13px 17px;border-bottom:1px solid var(--border);color:var(--accent);font-weight:700;font-size:14px}
  .cons-body{padding:15px 17px}
  .cons-body .content{font-size:13.5px}
  .cons-points{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .cpoint{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;padding:9px 12px;border-radius:11px;background:#0e1117;border:1px solid var(--border)}
  .cpoint .cflag{flex-shrink:0;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:7px;letter-spacing:.3px}
  .cpoint.agree .cflag{background:rgba(61,220,151,.16);color:var(--ok)}
  .cpoint.split .cflag{background:rgba(255,107,107,.14);color:#ff9a9a}
  .cpoint .cpt{color:var(--text)}
  .cpoint .cpd{color:var(--muted);display:block;margin-top:3px;line-height:1.5}
  /* ===== generating indicators ===== */
  .dots{display:inline-flex;gap:5px}
  .dots i{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));animation:bob 1.05s ease-in-out infinite}
  .dots i:nth-child(2){animation-delay:.14s}
  .dots i:nth-child(3){animation-delay:.28s}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.32}50%{transform:translateY(-5px);opacity:1}}
  /* persistent per-turn indicator: visible while the turn is .live; label only until first token */
  .livedot{display:inline-flex;align-items:center;gap:9px;margin-top:9px;font-size:12.5px}
  .sp:not(.live) .livedot,.mod-line:not(.live) .livedot{display:none}
  .livedot .glabel{display:none}
  .sp-card .content:empty + .livedot .glabel,.ml-tx:empty + .livedot .glabel{display:inline-block}
  .glabel{background:linear-gradient(90deg,#7a8090 0%,#eef1f7 50%,#7a8090 100%);background-size:200% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 1.9s linear infinite}
  @keyframes shimmer{to{background-position:-200% 0}}
  .spin{width:16px;height:16px;border-radius:50%;flex-shrink:0;
    background:conic-gradient(from 0deg,transparent 0%,var(--accent) 72%,var(--accent2) 100%);
    -webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 2.5px),#000 0);mask:radial-gradient(farthest-side,#0000 calc(100% - 2.5px),#000 0);
    animation:spin .72s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .cons-pending{display:flex;align-items:center;gap:12px;margin-top:24px;padding:16px 18px;border:1px solid var(--border);border-radius:17px;font-size:13px;
    background:linear-gradient(180deg,rgba(109,139,255,.09),transparent)}
  .phase-pill.busy{color:var(--accent);border-color:rgba(109,139,255,.42)}
  .phase-pill.busy::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);
    margin-right:7px;vertical-align:1px;box-shadow:0 0 8px var(--accent);animation:pulse2 1.2s ease-in-out infinite}
  @keyframes pulse2{50%{opacity:.28}}
  /* council welcome */
  .hero-sub{display:block;font-size:13px;font-weight:400;color:var(--muted);margin-top:10px;line-height:1.6;max-width:560px;margin-left:auto;margin-right:auto}
  .hero-sub b{color:var(--text);font-weight:600}
  main.council-welcome .inputbox{border-color:#3a3f6b;box-shadow:0 0 26px rgba(109,139,255,.16)}
  .hint{margin:6px 0 0;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<aside>
  <div class="sb-inner">
    <div class="brand"><span class="dot"></span> AI Gateway</div>
    <div class="newrow">
      <button class="newbtn" onclick="newChat()">＋ 일반</button>
      <button class="newbtn council" onclick="newCouncil()">🗣 토론</button>
    </div>
    <div class="convs" id="convs"></div>
    <div class="foot"><button class="foot-btn" onclick="setToken()">🔑 토큰 설정</button></div>
  </div>
</aside>
<main class="welcome" id="main">
  <header>
    <button class="iconbtn" id="sidebarToggle" title="사이드바 열기/닫기">☰</button>
    <div class="htitle" id="htitle">AI Gateway</div>
    <div class="spacer"></div>
  </header>
  <div id="chat"><div class="empty"><h2>무엇을 도와드릴까요?</h2><div>모델을 선택하고 메시지를 입력하세요.</div></div></div>
  <div class="composer">
    <div class="cwrap">
      <div class="hero" id="hero">무엇을 도와드릴까요?</div>
      <div class="inputbox" id="inputbox">
        <textarea id="input" rows="1" placeholder="메시지를 입력하세요…  (Enter 전송, Shift+Enter 줄바꿈)"></textarea>
        <div class="controls">
          <button class="ctoggle" id="councilBtn" onclick="toggleCouncil()" title="토론 모드 — 3 AI가 토론">🗣</button>
          <div class="dd" id="ddCombo"></div>
          <button class="send stopbtn" id="debateStop" onclick="stopDebate()" title="토론 종료" style="display:none">■</button>
          <button class="send" id="send" onclick="onSend()" title="전송">↑</button>
        </div>
      </div>
      <div class="hint" id="hint"></div>
    </div>
  </div>
</main>
<script src="/marked.min.js"></script>
<script src="/purify.min.js"></script>
<script>
const $ = (s)=>document.querySelector(s);
let TOKEN = localStorage.getItem('gw_token') || '';
let convId = null, busy = false, providers = [], curProvider = '', curModel = '', curCtrl = null, councilMode = false, curModerator = '';
let debateLive=false, debateId=null;
function onSend(){
  if(debateLive){ sendInterjection(); return; }
  if(busy){ stopGen(); return; }
  if(councilMode) sendCouncil(); else sendMsg();
}
function stopGen(){ if(curCtrl) curCtrl.abort(); }
function leaveLive(){ if(debateLive&&curCtrl) curCtrl.abort(); debateLive=false; debateId=null; }
function reflectUI(){
  const dd=$('#ddCombo'), ctog=$('#councilBtn'), stop=$('#debateStop'), input=$('#input');
  ctog.classList.toggle('on',councilMode);
  if(debateLive){
    ctog.style.display='none'; dd.style.display='none'; stop.style.display='flex';
    input.placeholder='토론에 끼어들어 말하기…  (Enter 전송)';
  }else{
    ctog.style.display=''; dd.style.display=''; stop.style.display='none';
    dd.style.opacity='1'; dd.style.pointerEvents='auto';
    input.placeholder=councilMode?'질문하면 3개 AI가 토론을 시작합니다…  (Enter 전송)':'메시지를 입력하세요…  (Enter 전송, Shift+Enter 줄바꿈)';
    renderComposerDD();
  }
}
function renderComposerDD(){ if(councilMode) buildModeratorDD(); else buildCombo(); }
function toggleCouncil(){ if(debateLive) return; councilMode=!councilMode; reflectUI(); if($('#main').classList.contains('welcome')) renderEmpty(); }
function newCouncil(){ leaveLive(); convId=null; councilMode=true; reflectUI(); renderEmpty(); loadConvs(); $('#input').focus(); }
function stopDebate(){ if(debateId) fetch('/api/council/'+debateId+'/stop',{method:'POST',headers:H()}).catch(()=>{}); }
function sendInterjection(){
  const ta=$('#input'); const text=ta.value.trim(); if(!text||!debateId) return;
  ta.value=''; autosize();
  fetch('/api/council/'+debateId+'/say',{method:'POST',headers:H(),body:JSON.stringify({text})}).catch(()=>{});
}

async function sendCouncil(){
  if(busy) return;
  const ta=$('#input'); const text=ta.value.trim(); if(!text) return;
  ta.value=''; autosize(); $('#main').classList.remove('welcome');
  const w=ensureWrap();
  const msg=document.createElement('div'); msg.className='msg assistant debate-msg';
  msg.innerHTML=`<div class="debate">
    <div class="stage">
      <div class="stage-q"><span class="qmark">Q</span><span class="qt"></span></div>
      <div class="roster"><span class="seat-sep"></span><span class="phase-pill">시작하는 중…</span></div>
      <div class="disputes" style="display:none"></div>
    </div>
    <div class="thread"></div>
    <div class="consensus-wrap"></div>
  </div>`;
  w.appendChild(msg); scroll();
  const root=msg.querySelector('.debate');
  const stageQ=root.querySelector('.qt'), roster=root.querySelector('.roster'),
        disputesEl=root.querySelector('.disputes'), thread=root.querySelector('.thread'),
        consWrap=root.querySelector('.consensus-wrap'); let phasePill=root.querySelector('.phase-pill');
  stageQ.textContent=text;

  const seats={}, blocks={}, bubbles={};
  const labelOf=(id)=>{ const p=providers.find(x=>x.id===id); return p?p.label:id; };
  let ticking=false;
  function tick(){ let active=false; for(const k in blocks){ const b=blocks[k]; if(b.shown<b.target.length){ const rem=b.target.length-b.shown; b.shown=Math.min(b.target.length,b.shown+Math.max(1,Math.ceil(rem/22))); b.el.innerHTML=md(b.target.slice(0,b.shown)); active=true; } } if(active){ scroll(); requestAnimationFrame(tick);} else ticking=false; }
  function pump(){ if(!ticking){ ticking=true; requestAnimationFrame(tick);} }

  function seatEl(key,label){ const s=document.createElement('span'); s.className='seat'; s.dataset.k=key;
    s.innerHTML=`<span class="cicon ${esc(key)}">${providerIcon(key)}</span><span>${esc(label)}</span>`; seats[key]=s; return s; }
  function buildRoster(parts, moderator){
    roster.innerHTML='';
    // 사회자 그룹 (왼쪽 앞)
    const mg=document.createElement('span'); mg.className='rgroup mod';
    mg.innerHTML='<span class="rtag">사회자</span>'; mg.appendChild(seatEl('__moderator', labelOf(moderator)));
    roster.appendChild(mg);
    const div=document.createElement('span'); div.className='rdiv'; roster.appendChild(div);
    // 참여자 그룹
    const pg=document.createElement('span'); pg.className='rgroup part';
    pg.innerHTML='<span class="rtag">참여자</span>';
    for(const p of parts) pg.appendChild(seatEl(p.key, p.label||labelOf(p.key)));
    roster.appendChild(pg);
    const sep=document.createElement('span'); sep.className='seat-sep'; roster.appendChild(sep);
    phasePill=document.createElement('span'); phasePill.className='phase-pill busy'; phasePill.textContent='개회'; roster.appendChild(phasePill);
  }
  // seats glow by refcount so several can be lit at once (e.g. all 3 in the opening)
  const seatCount={}; let moderatorId='', curPhase='';
  function seatOn(k){ if(!k) return; seatCount[k]=(seatCount[k]||0)+1; if(seats[k]) seats[k].classList.add('live'); }
  function seatOff(k){ if(!k) return; seatCount[k]=Math.max(0,(seatCount[k]||0)-1); if(!seatCount[k]&&seats[k]) seats[k].classList.remove('live'); }
  function clearLight(){ for(const k in seatCount) seatCount[k]=0; for(const id in seats) seats[id].classList.remove('live'); }
  function modIcon(){ return moderatorId?`<span class="cicon ${esc(moderatorId)}">${providerIcon(moderatorId)}</span>`:'◆'; }
  // a thread placeholder while the moderator deliberates (so the thread isn't empty during the gap)
  let modThinkEl=null;
  function showModThinking(){ if(modThinkEl||curPhase==='closing') return;
    modThinkEl=document.createElement('div'); modThinkEl.className='mod-line live mod-think';
    modThinkEl.innerHTML=`<div class="ml-ic mod-ic">${modIcon()}</div><div class="ml-body"><div class="ml-tx"></div>${liveDot('사회자가 다음 진행을 검토하는 중')}</div>`;
    thread.appendChild(modThinkEl); scroll(); }
  function clearModThinking(){ if(modThinkEl){ modThinkEl.remove(); modThinkEl=null; } }
  function renderDisputes(items){
    if(!items||!items.length){ disputesEl.style.display='none'; return; }
    disputesEl.style.display='flex'; disputesEl.innerHTML='';
    for(const it of items){ const d=document.createElement('span'); d.className='dispute'; d.dataset.id=it.id;
      d.innerHTML=`<span class="dn">${esc(String(it.id))}</span><span class="dt" title="${esc(it.detail||'')}">${esc(it.title||'')}</span>`; disputesEl.appendChild(d); }
  }
  // current dispute pulses (active); any dispute touched stays marked (visited) so progress shows across all 3
  function activeDispute(id){ disputesEl.querySelectorAll('.dispute').forEach(d=>{ const on=id&&d.dataset.id===String(id); d.classList.toggle('active',on); if(on) d.classList.add('visited'); }); }
  function startAgentTurn(ev){
    clearModThinking(); seatOn(ev.speaker); activeDispute(ev.disputeId);
    const sp=document.createElement('div'); sp.className='sp live'; sp.dataset.t=ev.turnId; sp.dataset.k=ev.speaker;
    const tags=(ev.target?`<span class="tag vs">→ ${esc(labelOf(ev.target))}</span>`:'')
              +(ev.disputeId?`<span class="tag disp">쟁점 ${esc(String(ev.disputeId))}</span>`:'');
    sp.innerHTML=`<div class="av ${esc(ev.speaker)}">${providerIcon(ev.speaker)}</div>
      <div class="sp-main"><div class="sp-hd"><span class="sp-name">${esc(labelOf(ev.speaker))}</span>${tags}</div>
      <div class="sp-card"><div class="content"></div>${liveDot('생각하는 중')}</div></div>`;
    thread.appendChild(sp); bubbles[ev.turnId]=sp; blocks[ev.turnId]={el:sp.querySelector('.content'),target:'',shown:0}; scroll();
  }
  function startModTurn(ev){
    clearModThinking(); seatOn('__moderator');
    const ml=document.createElement('div'); ml.className='mod-line live'; ml.dataset.t=ev.turnId; ml.dataset.k='__moderator';
    ml.innerHTML=`<div class="ml-ic mod-ic">${modIcon()}</div><div class="ml-body"><div class="ml-tx"></div>${liveDot('진행 멘트 작성 중')}</div>`;
    thread.appendChild(ml); bubbles[ev.turnId]=ml; blocks[ev.turnId]={el:ml.querySelector('.ml-tx'),target:'',shown:0}; scroll();
  }
  let pendingEl=null;
  function showPending(label){ if(pendingEl) return; pendingEl=document.createElement('div'); pendingEl.className='cons-pending'; pendingEl.innerHTML=`<span class="spin"></span><span class="glabel">${esc(label)}</span>`; consWrap.appendChild(pendingEl); scroll(); }
  function clearPending(){ if(pendingEl){ pendingEl.remove(); pendingEl=null; } }
  function renderUser(text){
    clearModThinking();
    const sp=document.createElement('div'); sp.className='sp chair';
    sp.innerHTML=`<div class="av">나</div><div class="sp-main"><div class="sp-hd"><span class="sp-name">나의 개입</span></div><div class="sp-card"><div class="content">${md(text)}</div></div></div>`;
    thread.appendChild(sp); scroll();
  }
  function renderConsensus(ev){
    clearPending(); clearModThinking(); activeDispute(null); seatOn('__moderator'); // moderator delivers the verdict → keep it glowing
    const c=document.createElement('div'); c.className='consensus';
    let pts='';
    if(ev.points&&ev.points.length){ pts='<div class="cons-points">'+ev.points.map(p=>{
      const ag=p.status==='agree'; return `<div class="cpoint ${ag?'agree':'split'}"><span class="cflag">${ag?'합의':'쟁점'}</span><span><span class="cpt">${esc(p.point||'')}</span>${p.detail?`<span class="cpd">${esc(p.detail)}</span>`:''}</span></div>`;
    }).join('')+'</div>'; }
    c.innerHTML=`<div class="cons-hd">⚖ 합의 · 결론</div><div class="cons-body"><div class="content">${md(ev.summary||'')}</div>${pts}</div>`;
    consWrap.appendChild(c); scroll();
  }

  let errMsg=null;
  busy=true; curCtrl=new AbortController();
  try{
    const r=await fetch('/api/council',{method:'POST',headers:H(),signal:curCtrl.signal,body:JSON.stringify({question:text, moderator:curModerator||undefined})});
    const reader=r.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){ const {value,done}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      let i; while((i=buf.indexOf('\n\n'))>=0){ const chunk=buf.slice(0,i); buf=buf.slice(i+2); const line=chunk.replace(/^data: /,''); if(!line) continue;
        let ev; try{ev=JSON.parse(line);}catch{continue;}
        if(ev.type==='debate'){ debateId=ev.debateId; debateLive=true; moderatorId=ev.moderator; reflectUI(); buildRoster(ev.participants, ev.moderator); }
        else if(ev.type==='phase'){ curPhase=ev.phase; if(phasePill){ phasePill.textContent=ev.label||''; phasePill.classList.add('busy'); } if(ev.phase==='closing') showPending('결론을 정리하는 중…'); }
        else if(ev.type==='moderating'){ if(ev.active){ seatOn('__moderator'); showModThinking(); } else { seatOff('__moderator'); clearModThinking(); } }
        else if(ev.type==='disputes'){ renderDisputes(ev.items); }
        else if(ev.type==='turn_start'){ if(ev.speaker==='__moderator') startModTurn(ev); else startAgentTurn(ev); }
        else if(ev.type==='delta'){ const b=blocks[ev.turnId]; if(b){ b.target+=ev.text; pump(); } }
        else if(ev.type==='turn_end'){ const sp=bubbles[ev.turnId]; if(sp){ sp.classList.remove('live'); seatOff(sp.dataset.k); if(ev.interrupted) sp.classList.add('cut'); if(ev.error) sp.classList.add('failed'); } }
        else if(ev.type==='user'){ renderUser(ev.text); }
        else if(ev.type==='consensus'){ renderConsensus(ev); }
        else if(ev.type==='error'){ errMsg=ev.message; }
        else if(ev.type==='done'){ clearLight(); clearPending(); clearModThinking(); if(phasePill){ phasePill.textContent='토론 종료'; phasePill.classList.remove('busy'); } }
      }
    }
  }catch(e){ if(!(e.name==='AbortError'||(curCtrl&&curCtrl.signal.aborted))) errMsg=String(e); }
  clearLight(); clearPending();
  if(errMsg){ const er=document.createElement('div'); er.className='err'; er.textContent='⚠ '+errMsg; consWrap.appendChild(er); }
  debateLive=false; debateId=null; busy=false; curCtrl=null; reflectUI();
}

function setToken(){
  const t = prompt('Gateway 토큰을 입력하세요:', TOKEN);
  if(t!==null){ TOKEN=t.trim(); localStorage.setItem('gw_token',TOKEN); boot(); }
}
function H(o){ return {'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}; }

async function boot(){
  try{
    const r = await fetch('/api/providers',{headers:H()});
    if(r.status===401){ if(!TOKEN) setToken(); return; }
    const d = await r.json();
    providers = d.providers;
    const first = providers.find(p=>p.enabled) || providers[0];
    curProvider = first ? first.id : '';
    curModel = firstModelOf(curProvider);
    const enabled = providers.filter(p=>p.enabled);
    curModerator = ((enabled.find(p=>p.id==='claude'))||enabled[0]||{}).id||'';
    renderComposerDD();
    loadConvs();
  }catch(e){ /* offline */ }
}
function firstModelOf(pid){ const p=providers.find(x=>x.id===pid); return (p && p.models && p.models.length) ? p.models[0].id : ''; }
function buildCombo(){
  const el=$('#ddCombo');
  const p=providers.find(x=>x.id===curProvider)||{}; const ms=(p.models)||[];
  const m=ms.find(x=>x.id===curModel)||{};
  el.innerHTML = `<button class="dd-btn" type="button"><span class="cicon ${esc(curProvider)}">${providerIcon(curProvider)}</span><span class="dd-val">${esc(m.label||p.label||'—')}</span><span class="chev">▼</span></button>`
    + `<div class="dd-menu">`
    + `<div class="dd-lbl">에이전트</div>`
    + providers.map(x=>`<div class="dd-item${x.id===curProvider?' sel':''}${x.enabled?'':' dis'}" data-kind="agent" data-v="${esc(x.id)}"><span style="display:flex;align-items:center;gap:8px"><span class="cicon ${esc(x.id)}">${providerIcon(x.id)}</span>${esc(x.label)}${x.enabled?'':' <span class="muted">준비중</span>'}</span></div>`).join('')
    + `<div class="dd-div"></div>`
    + `<div class="dd-lbl">모델</div>`
    + ms.map(x=>`<div class="dd-item${x.id===curModel?' sel':''}" data-kind="model" data-v="${esc(x.id)}"><span>${esc(x.label)}</span></div>`).join('')
    + `</div>`;
  el.querySelector('.dd-btn').onclick=(e)=>{ e.stopPropagation(); const open=el.classList.contains('open'); closeAllDD(); if(!open) el.classList.add('open'); };
  el.querySelectorAll('.dd-item').forEach(it=>{
    if(it.classList.contains('dis')) return;
    it.onclick=(e)=>{ e.stopPropagation();
      const kind=it.getAttribute('data-kind'), v=it.getAttribute('data-v');
      if(kind==='agent'){
        if(v!==curProvider){ curProvider=v; curModel=firstModelOf(v); }
        buildCombo(); $('#ddCombo').classList.add('open');   // 에이전트 고르면 모델 선택하도록 열어둠
      } else {
        curModel=v; buildCombo(); $('#ddCombo').classList.remove('open'); // 모델 선택 → 닫힘
      }
    };
  });
}
function buildModeratorDD(){
  const el=$('#ddCombo');
  const enabled=providers.filter(p=>p.enabled);
  if(!curModerator || !enabled.find(p=>p.id===curModerator)) curModerator=((enabled.find(p=>p.id==='claude'))||enabled[0]||{}).id||'';
  const m=providers.find(p=>p.id===curModerator)||{};
  el.innerHTML = `<button class="dd-btn" type="button" title="토론을 진행할 사회자"><span class="dd-cap">사회자</span><span class="cicon ${esc(curModerator)}">${providerIcon(curModerator)}</span><span class="dd-val">${esc(m.label||'—')}</span><span class="chev">▼</span></button>`
    + `<div class="dd-menu"><div class="dd-lbl">사회자</div>`
    + providers.map(x=>`<div class="dd-item${x.id===curModerator?' sel':''}${x.enabled?'':' dis'}" data-v="${esc(x.id)}"><span style="display:flex;align-items:center;gap:8px"><span class="cicon ${esc(x.id)}">${providerIcon(x.id)}</span>${esc(x.label)}${x.enabled?'':' <span class="muted">준비중</span>'}</span></div>`).join('')
    + `</div>`;
  el.querySelector('.dd-btn').onclick=(e)=>{ e.stopPropagation(); const open=el.classList.contains('open'); closeAllDD(); if(!open) el.classList.add('open'); };
  el.querySelectorAll('.dd-item').forEach(it=>{ if(it.classList.contains('dis')) return;
    it.onclick=(e)=>{ e.stopPropagation(); curModerator=it.getAttribute('data-v'); buildModeratorDD(); el.classList.remove('open'); }; });
}
function closeAllDD(){ document.querySelectorAll('.dd.open').forEach(d=>d.classList.remove('open')); }
document.addEventListener('click',closeAllDD);

async function loadConvs(){
  const r = await fetch('/api/conversations',{headers:H()});
  const d = await r.json();
  const box=$('#convs'); box.innerHTML='';
  for(const c of d.conversations){
    const el=document.createElement('div');
    el.className='conv'+(c.id===convId?' active':'');
    el.innerHTML=`<span class="cicon ${esc(c.provider)}">${providerIcon(c.provider)}</span><span class="ctitle">${esc(c.title||'대화')}</span><span class="x" title="삭제">✕</span>`;
    el.onclick=(e)=>{ if(e.target.classList.contains('x')){delConv(c.id);return;} openConv(c.id); };
    box.appendChild(el);
  }
}
async function delConv(id){
  await fetch('/api/conversations/'+id,{method:'DELETE',headers:H()});
  if(id===convId){ convId=null; renderEmpty(); }
  loadConvs();
}
function newChat(){ leaveLive(); convId=null; councilMode=false; reflectUI(); renderEmpty(); loadConvs(); $('#input').focus(); }
function renderEmpty(){
  $('#main').classList.add('welcome');
  $('#main').classList.toggle('council-welcome', councilMode);
  $('#hero').innerHTML = councilMode
    ? '🗣 토론 모드<span class="hero-sub">질문을 던지면 3개의 AI가 각자 답하고, 사회자의 진행 아래 서로 지목해 반박합니다. 도중 언제든 끼어들어 토론의 흐름을 바꿀 수 있어요.<br><br>입력창 오른쪽 드롭다운에서 <b>사회자</b>를 직접 고르세요 — 사회자가 쟁점을 잡고, 누가 누구에게 반박할지 지목하며, 마지막에 결론을 종합합니다.</span>'
    : '무엇을 도와드릴까요?';
  $('#chat').innerHTML='<div class="empty"></div>';
}

async function openConv(id){
  leaveLive(); councilMode=false; reflectUI();
  const r = await fetch('/api/conversations/'+id,{headers:H()});
  const c = await r.json();
  convId=id; curProvider=c.provider; curModel=firstModelOf(c.provider); buildCombo();
  $('#main').classList.remove('welcome');
  $('#chat').innerHTML='<div class="wrap" id="wrap"></div>';
  for(const m of c.messages){ addMsg(m.role, m.content, c.provider); }
  loadConvs(); scroll();
}

marked.setOptions({ gfm:true, breaks:true });
function md(s){ try{ return DOMPurify.sanitize(marked.parse(s||'')); }catch(e){ return esc(s); } }
function liveDot(label){ return `<div class="livedot"><span class="dots"><i></i><i></i><i></i></span><span class="glabel">${esc(label)}</span></div>`; }

function toolSummary(name, input){
  input=input||{};
  if(name==='Bash') return {sub:input.description||'', body:input.command||''};
  if(['Read','Edit','Write','NotebookEdit'].includes(name)) return {sub:'', body:input.file_path||input.notebook_path||JSON.stringify(input)};
  if(name==='Grep') return {sub:input.path||'', body:input.pattern||''};
  if(name==='Glob') return {sub:'', body:input.pattern||''};
  if(name==='WebFetch') return {sub:'', body:input.url||''};
  if(name==='WebSearch') return {sub:'', body:input.query||''};
  if(name==='Task') return {sub:input.subagent_type||'', body:input.description||''};
  const s=JSON.stringify(input); return {sub:'', body:s.length>240?s.slice(0,240)+'…':s};
}
function toolBlock(ev){
  const {sub,body}=toolSummary(ev.name, ev.input);
  const el=document.createElement('div'); el.className='toolcall';
  el.innerHTML=`<div class="thead"><span class="tname">🔧 ${esc(ev.name)}</span>${sub?`<span class="tsub">${esc(sub)}</span>`:''}</div>`
    +(body?`<pre class="tcmd">${esc(body)}</pre>`:'');
  return el;
}
function attachResult(el, ev){
  if(!el) return;
  const pre=document.createElement('pre'); pre.className='tout'+(ev.isError?' err':'');
  const t=ev.text||''; const max=2000;
  pre.textContent = t.length>max ? t.slice(0,max)+'\n…('+(t.length-max)+' more chars)' : (t||'(no output)');
  el.appendChild(pre);
}
function ensureWrap(){ let w=$('#wrap'); if(!w){ $('#chat').innerHTML='<div class="wrap" id="wrap"></div>'; w=$('#wrap'); } return w; }
function addMsg(role, content, provider){
  const w=ensureWrap();
  const el=document.createElement('div'); el.className='msg '+role;
  const pInfo = provider ? providers.find(x=>x.id===provider) : null;
  const av = role==='user'
    ? '<div class="avatar">나</div>'
    : `<div class="avatar ${provider?esc(provider):''}">${provider?providerIcon(provider):'AI'}</div>`;
  const label = role==='user' ? 'You' : (pInfo?esc(pInfo.label):'AI');
  el.innerHTML=`${av}<div class="body"><div class="role">${label}</div><div class="content">${md(content)}</div></div>`;
  w.appendChild(el); scroll(); return el.querySelector('.content');
}
function scroll(){ const c=$('#chat'); c.scrollTop=c.scrollHeight; }

async function sendMsg(){
  if(busy) return;
  const ta=$('#input'); const text=ta.value.trim(); if(!text) return;
  const provider=curProvider;
  if(!provider){ alert('사용 가능한 에이전트가 없습니다'); return; }
  ta.value=''; autosize();
  $('#main').classList.remove('welcome');
  addMsg('user', text);
  // assistant 메시지 셸 — 순서가 있는 세그먼트(텍스트 블록 + 도구 호출)
  const w=ensureWrap();
  const msg=document.createElement('div'); msg.className='msg assistant';
  const pInfo=providers.find(x=>x.id===curProvider); const mInfo=((pInfo&&pInfo.models)||[]).find(x=>x.id===curModel);
  const roleLabel=(pInfo?pInfo.label:'AI')+(mInfo?(' · '+mInfo.label):'');
  msg.innerHTML=`<div class="avatar ${esc(curProvider)}">${providerIcon(curProvider)}</div><div class="body"><div class="role">${esc(roleLabel)}</div><div class="segments"></div></div>`;
  w.appendChild(msg); scroll();
  const segs=msg.querySelector('.segments');
  const toolEls={}; // tool_use id → element (결과 붙일 곳)
  // "생각 중" 스피너 (첫 토큰 도착 전까지)
  const thinking=document.createElement('div'); thinking.className='thinking';
  thinking.innerHTML='<span></span><span></span><span></span><span></span><span></span>';
  segs.appendChild(thinking);
  function killThinking(){ if(thinking.parentNode) thinking.remove(); }
  busy=true; curCtrl=new AbortController();
  const sendBtn=$('#send'); sendBtn.classList.add('stopbtn'); sendBtn.textContent='■'; sendBtn.title='중지';

  // 세그먼트별 타자기: claude의 덩어리 출력을 부드럽게, 도구 전후 순서 유지
  let curEl=null, curTarget='', curShown=0, ticking=false, streamDone=false, errMsg=null, resolveDrain;
  const drained=new Promise(r=>resolveDrain=r);
  function newSeg(){ curEl=document.createElement('div'); curEl.className='content cursor'; curTarget=''; curShown=0; segs.appendChild(curEl); }
  function renderCur(){ if(curEl) curEl.innerHTML=md(curTarget.slice(0,curShown)); }
  function snapCur(){ if(curEl){ curShown=curTarget.length; renderCur(); curEl.classList.remove('cursor'); curEl=null; } }
  function tick(){
    if(curEl && curShown<curTarget.length){
      const remaining=curTarget.length-curShown;
      const step=Math.max(1, Math.ceil(remaining/25)); // 뒤처질수록 빨리 따라잡기
      curShown=Math.min(curTarget.length, curShown+step); renderCur(); scroll();
      requestAnimationFrame(tick);
    } else if(streamDone){ ticking=false; renderCur(); if(curEl) curEl.classList.remove('cursor'); resolveDrain(); }
    else { ticking=false; }
  }
  function pump(){ if(!ticking){ ticking=true; requestAnimationFrame(tick); } }

  try{
    const r = await fetch('/api/chat',{method:'POST',headers:H(), signal:curCtrl.signal,
      body:JSON.stringify({provider, model:curModel, conversationId:convId, message:text})});
    const reader=r.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){
      const {value,done}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      let i; while((i=buf.indexOf('\n\n'))>=0){
        const chunk=buf.slice(0,i); buf=buf.slice(i+2);
        const line=chunk.replace(/^data: /,'');
        if(!line) continue;
        let ev; try{ev=JSON.parse(line);}catch{continue;}
        if(ev.type==='meta'){ if(!convId){convId=ev.conversationId; loadConvs();} }
        else if(ev.type==='delta'){ killThinking(); if(!curEl) newSeg(); curTarget+=ev.text; pump(); }
        else if(ev.type==='tool'){ killThinking(); snapCur(); segs.appendChild(toolEls[ev.id]=toolBlock(ev)); scroll(); }
        else if(ev.type==='tool_result'){ attachResult(toolEls[ev.id], ev); scroll(); }
        else if(ev.type==='error'){ killThinking(); errMsg=ev.message; }
        else if(ev.type==='done'){ if(ev.cost) $('#hint').textContent='이번 응답 비용 $'+Number(ev.cost).toFixed(4); }
      }
    }
    streamDone=true; pump();
    if(!curEl || curShown>=curTarget.length){ renderCur(); if(curEl) curEl.classList.remove('cursor'); resolveDrain(); }
    await drained;
  }catch(e){
    if(e.name==='AbortError' || (curCtrl && curCtrl.signal.aborted)){
      snapCur(); const n=document.createElement('div'); n.className='stopnote'; n.textContent='⏹ 중지됨'; segs.appendChild(n);
    } else { errMsg=String(e); snapCur(); }
  }
  killThinking();
  if(errMsg){ const er=document.createElement('div'); er.className='err'; er.textContent='⚠ '+errMsg; segs.appendChild(er); }
  busy=false; curCtrl=null;
  sendBtn.classList.remove('stopbtn'); sendBtn.textContent='↑'; sendBtn.title='전송';
}

$('#sidebarToggle').addEventListener('click',()=> document.body.classList.toggle('sidebar-collapsed'));
const ta=$('#input');
function autosize(){ ta.style.height='auto'; const sh=ta.scrollHeight; ta.style.height=Math.min(sh,340)+'px'; ta.style.overflowY = sh>340 ? 'auto' : 'hidden'; $('#inputbox').classList.toggle('tall', sh>48); }
ta.addEventListener('input',autosize);
ta.addEventListener('keydown',(e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); onSend(); } });
boot();
</script>
